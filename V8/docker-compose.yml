name: v8-industrial-iot

services:
  message-broker:
    image: rabbitmq:3.13-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: v8
      RABBITMQ_DEFAULT_PASS: v8_password
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mqtt-broker:
    image: emqx/emqx:5.8.4
    restart: always
    environment:
      EMQX_NODE__COOKIE: v8_edge_cookie
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: v8_mqtt_password
    ports:
      - "1883:1883"
      - "18083:18083"
    healthcheck:
      test: ["CMD-SHELL", "/opt/emqx/bin/emqx_ctl status"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgresql:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: v8
      POSTGRES_PASSWORD: v8_password
      POSTGRES_DB: v8_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U v8 -d v8_platform"]
      interval: 10s
      timeout: 5s
      retries: 10

  influxdb:
    image: influxdb:2.7-alpine
    restart: always
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: v8
      DOCKER_INFLUXDB_INIT_PASSWORD: v8_password_123
      DOCKER_INFLUXDB_INIT_ORG: v8
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: v8-influx-token
    ports:
      - "8086:8086"
    volumes:
      - influx-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  tcp-gateway:
    build:
      context: .
      dockerfile: services/tcp-gateway/Dockerfile
    restart: always
    environment:
      RABBITMQ_URL: amqp://v8:v8_password@message-broker:5672
      TCP_GATEWAY_PORT: 9000
      DEFAULT_TENANT_ID: T1
      DEFAULT_DEVICE_ID: DEV001
      DEFAULT_PROTOCOL: json
    ports:
      - "9000:9000"
    depends_on:
      message-broker:
        condition: service_healthy

  ingestion-service:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    restart: always
    environment:
      RABBITMQ_URL: amqp://v8:v8_password@message-broker:5672
    depends_on:
      message-broker:
        condition: service_healthy

  stream-engine:
    build:
      context: .
      dockerfile: services/stream-engine/Dockerfile
    restart: always
    environment:
      RABBITMQ_URL: amqp://v8:v8_password@message-broker:5672
      REDIS_URL: redis://redis:6379
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: v8-influx-token
      INFLUX_ORG: v8
      INFLUX_BUCKET: telemetry
    depends_on:
      message-broker:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  signalr-service:
    build:
      context: .
      dockerfile: services/signalr-service/Dockerfile
    restart: always
    environment:
      RABBITMQ_URL: amqp://v8:v8_password@message-broker:5672
    ports:
      - "8090:8080"
    depends_on:
      message-broker:
        condition: service_healthy

  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    restart: always
    environment:
      JWT_SECRET: replace-with-a-long-random-secret
      POSTGRES_HOST: postgresql
      POSTGRES_PORT: 5432
      POSTGRES_USER: v8
      POSTGRES_PASSWORD: v8_password
      POSTGRES_DB: v8_platform
      RABBITMQ_URL: amqp://v8:v8_password@message-broker:5672
      MQTT_URL: mqtt://mqtt-broker:1883
    ports:
      - "8080:8080"
    depends_on:
      postgresql:
        condition: service_healthy
      message-broker:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: v8-scada-ui/Dockerfile
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - signalr-service
      - gateway-service

volumes:
  postgres-data:
  influx-data:
